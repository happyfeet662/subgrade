    <text x="82" y="46" font-size="42" font-weight="700" fill="#3b4a5a">SUB<tspan fill="#ff6f7e">GRADE</tspan></text>
  </g>

  <!-- headline -->
  <text x="90" y="300" font-size="62" font-weight="700" fill="#3b4a5a">英語では詳しいのに、</text>
  <text x="90" y="386" font-size="62" font-weight="700" fill="#3b4a5a">日本語に<tspan fill="#8b7cf0">ない</tspan>解説を。</text>
  <text x="94" y="452" font-size="28" fill="#64717f">中級者のための Premiere Pro / Adobe 学習メディア</text>

  <!-- editing illustration -->
