    <circle cx="-140" cy="-103" r="5" fill="#ff6f7e"/><circle cx="-124" cy="-103" r="5" fill="#ffc94d"/><circle cx="-108" cy="-103" r="5" fill="#3fca9f"/>
    <rect x="-140" y="-70" width="280" height="86" rx="12" fill="#f2effc"/>
    <circle cx="0" cy="-27" r="30" fill="#8b7cf0"/>
    <path d="M-8 -41v28l22-14-22-14z" fill="#fff"/>

