<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" font-family="'Hiragino Maru Gothic ProN','Hiragino Sans',sans-serif">
  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="0" flood-color="#00000010"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="#fff3e6"/>
  <rect width="1200" height="630" fill="none"/>

  <!-- sparkles -->
  <path d="M120 120 l7 22 22 7 -22 7 -7 22 -7-22 -22-7 22-7z" fill="#ffc94d"/>
  <path d="M1080 470 l6 18 18 6 -18 6 -6 18 -6-18 -18-6 18-6z" fill="#ff6f7e"/>
